name: MISRA Copyright Check

on:
  push:
    branches: [main]

jobs:
  copyright-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run copyright check
        run: python3 scripts/check-copyright.py
